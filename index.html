<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>포철공고 캐릭터 유형 테스트</title>

    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet" />

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #f4f7f6;
            font-family: 'Gowun Dodum', sans-serif;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 520px;
            border-radius: 20px;
            border: 4px solid #333;
            box-shadow: 6px 6px 0px #333;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        h1, h2, h3, .result-title, .start-btn, .btn, #q-num, .mini-badge, .card-label {
            font-family: 'Jua', sans-serif;
        }

        h1 {
            font-size: 2.2rem;
            color: #ff6b6b;
            margin-bottom: 10px;
            line-height: 1.35;
            word-break: keep-all;
        }

        .subtitle {
            font-size: 1.15rem;
            color: #555;
            margin-bottom: 24px;
            line-height: 1.6;
            word-break: keep-all;
        }

        .big-emoji-box {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px 22px;
            margin: 24px 0 26px;
        }

        .big-emoji-box span {
            font-size: 4.5rem;
            line-height: 1;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px 16px;
            margin: 12px 0;
            border: 3px solid #333;
            border-radius: 15px;
            background-color: #ffeaa7;
            cursor: pointer;
            font-size: 1.15rem;
            transition: all 0.2s;
            text-align: left;
            word-break: keep-all;
            line-height: 1.5;
        }

        .btn:hover {
            background-color: #fab1a0;
            transform: translateY(-3px);
            box-shadow: 4px 4px 0px #333;
        }

        .start-btn {
            background-color: #55efc4;
            text-align: center;
            font-size: 1.4rem;
        }

        .start-btn:hover {
            background-color: #00b894;
        }

        .progress-container {
            width: 100%;
            background-color: #eee;
            border: 3px solid #333;
            border-radius: 15px;
            height: 24px;
            margin-bottom: 20px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background-color: #74b9ff;
            width: 0%;
            transition: width 0.3s;
        }

        #question-screen,
        #result-screen {
            display: none;
        }

        #q-num {
            font-weight: bold;
            font-size: 1.25rem;
            margin-bottom: 6px;
        }

        #q-title {
            font-size: 1.45rem;
            line-height: 1.5;
            word-break: keep-all;
            margin-bottom: 16px;
        }

       .result-headline {
            text-align: center;
            margin-bottom: 12px;
        }

        .mini-badge {
            display: inline-block;
            background: #fff4d6;
            border: 2px solid #333;
            border-radius: 999px;
            padding: 6px 14px;
            font-size: 0.96rem;
            margin-bottom: 10px;
        }

        .result-title {
            font-size: 2.35rem;
            line-height: 1.2;
            color: #e43b2f;
            margin-bottom: 10px;
            word-break: keep-all;
        }

        .result-subtitle {
            text-align: center;
            color: #4f4f4f;
            font-size: 1rem;
            line-height: 1.65;
            margin-bottom: 18px;
            word-break: keep-all;
        }

        .result-main-card {
            background: linear-gradient(180deg, #fffef7 0%, #fff 100%);
            border: 4px solid #333;
            border-radius: 28px;
            padding: 18px 16px 16px;
            box-shadow: 6px 6px 0 #333;
            margin-bottom: 18px;
        }

        .inner-main-box {
            background: #f8f7f1;
            border-radius: 20px;
            padding: 16px 12px 10px;
            margin-bottom: 12px;
        }

        .result-img-box {
            display: flex;
            justify-content: center;
            margin-bottom: 6px;
        }

        .result-img-box img {
            width: 230px;
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 14px;
            border: none;
            object-fit: cover;
        }

        .card-label {
            display: inline-block;
            background: #111;
            color: #fff;
            border-radius: 999px;
            padding: 6px 12px;
            font-family: 'Jua', sans-serif;
            font-size: 1rem;
            margin: 4px 0 10px;
        }

        .result-desc {
            background: #fff;
            border: 3px dashed #444;
            border-radius: 20px;
            padding: 15px;
            line-height: 1.9;
            font-size: 1.03rem;
            text-align: left;
            word-break: keep-all;
        }

        .summary-line {
            display: inline;
            font-family: 'Jua', sans-serif;
            font-size: 1.08rem;
            color: #111;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
            margin-bottom: 18px;
        }

        .info-card {
            border: 4px solid #333;
            border-radius: 24px;
            padding: 18px 16px;
            box-shadow: 5px 5px 0 #333;
        }

        .weapons-card {
            background: #f5e19a;
        }

        .sub-card {
            background: #d9edf3;
        }

        .info-card h3 {
            margin: 0 0 14px;
            text-align: center;
            font-size: 1.85rem;
            line-height: 1.2;
            color: #111;
            font-family: 'Jua', sans-serif;
        }

        .weapons-card {
            background: #ffeaa7;
        }

        .sub-card {
            background: #d9edf3;
        }

        .info-card h3 {
            margin: 0 0 14px;
            text-align: center;
            font-size: 1.85rem;
            line-height: 1.2;
            color: #111;
            font-family: 'Jua', sans-serif;
        }

        .weapon-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .weapon-tag {
            background: #fff;
            border: 2px solid #333;
            border-radius: 20px;
            padding: 6px 12px;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 2px 2px 0px #333;
        }

        .sub-result-img-box {
            display: flex;
            justify-content: center;
            margin-top: 6px;
        }

        .sub-result-img-box img {
            width: 180px;
            height: auto;
            border-radius: 16px;
            border: none;
            object-fit: cover;
        }

        .retry-btn {
            margin-top: 6px;
        }

        @media (max-width: 480px) {
            body {
                padding: 14px;
            }

            .container {
                padding: 22px 18px;
            }

            h1 {
                font-size: 1.9rem;
            }

            .result-title {
                font-size: 1.9rem;
            }

            .btn {
                font-size: 1.05rem;
            }

            #q-title {
                font-size: 1.3rem;
            }

            .big-emoji-box {
                gap: 14px 16px;
            }

            .big-emoji-box span {
                font-size: 3.6rem;
            }

            .result-img-box img {
                width: 210px;
            }

            .sub-result-img-box img {
                width: 150px;
            }

            .info-card h3 {
                font-size: 1.55rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <h1>🛠️ 포철공고 캐릭터 테스트 🛠️</h1>
        <p class="subtitle">
            나는 어떤 유형의 캐릭터일까?<br>
            나의 영어 무기도 확인해 보자구!
        </p>

        <div class="big-emoji-box" aria-label="유형 동물 이모지">
            <span>🦉</span>
            <span>🐶</span>
            <span>🐹</span>
            <span>🐼</span>
            <span>🐿️</span>
            <span>😄</span>
            <span>🐃</span>
        </div>

        <button class="btn start-btn" onclick="startTest()">테스트 시작하기! 🚀</button>
    </div>

    <div id="question-screen">
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div id="q-num">Q1.</div>
        <h2 id="q-title">질문 내용</h2>
        <div id="answers-box"></div>
    </div>

    <div id="result-screen">
        <div class="result-headline">
            <div class="mini-badge">실습실 자아 분석 결과</div>
            <div class="result-title" id="result-name">캐릭터 이름</div>
            <div class="result-subtitle" id="result-subtitle">
                반 친구들이 보면 “이거 너 아니냐?” 할 확률 높은 결과입니다.
            </div>
        </div>

        <div class="result-main-card">
            <div class="inner-main-box">
                <div class="result-img-box">
                    <img id="result-img" src="" alt="메인 결과 이미지">
                </div>
            </div>

            <div class="card-label">팩폭 결과 카드</div>
            <div class="result-desc" id="result-desc">
                팩폭 설명이 들어갑니다.
            </div>
        </div>

        <div class="result-grid">
            <div class="info-card weapons-card">
                <h3>⚔️ 나의 영어 무기 ⚔️</h3>
                <div class="weapon-tags" id="result-weapons"></div>
            </div>

            <div class="info-card sub-card">
                <h3>👀 내 안의 숨은 서브 자아</h3>
                <div class="sub-result-img-box">
                    <img id="sub-result-img" src="" alt="서브 결과 이미지">
                </div>
            </div>
        </div>

        <button class="btn start-btn retry-btn" onclick="location.reload()">다시 해보기 🔄</button>
    </div>
</div>

<script>
    const questionsData = [
        {
    question: "1. 실습 시간. 기계가 갑자기 ‘끼기긱...’ 하면서 수상한 소리를 냈다. 반 애들 시선이 전부 너한테 꽂힘. 너는?",
    options: [
      { text: "“잠깐, 이거 그냥 넘기면 더 큰일 날 듯. 왜 이런 소리 나는지 직접 봐야겠다.” 하고 원인부터 캐본다.", type: "도전형" },
      { text: "“야 일단 다 뒤로 가. 괜히 만지지 마.” 하면서 사람부터 정리한다.", type: "협력형" },
      { text: "“비켜봐. 내가 해봄.” 하고 이미 공구부터 들고 있다.", type: "실행형" },
          { text: "“에이 아직 안 터졌잖아~” 하면서 상황을 웃어넘긴다.", type: "긍정형" }
        ]
      },
      {
        question: "2. 수행평가 제출 30분 전. USB가 갑자기 먹통이 됐다.",
        options: [
          { text: "“야 저장 안 한 거 아니지? 일단 백업부터 확인하자.” 최악 상황부터 체크한다.", type: "안전형" },
          { text: "“이거 폰으로 옮겨서 해결 가능하지 않나?” 다른 방법 찾는다.", type: "도전형" },
          { text: "“아직 30분이나 남았네.” 말없이 처음부터 다시 시작한다.", type: "끈기형" },
          { text: "“언제부터 안 됐는지 말해봐.” 증상부터 추적하면서 머릿속으로 복기한다.", type: "분석형" }
        ]
      },
      {
        question: "3. 쉬는시간, 친구들이 매점 간다는데 수업 시작 5분 전이다.",
        options: [
          { text: "“야 시간 없으니까 각자 하나씩 맡아서 사오자. 내가 계산 맡음.” 하면서 역할부터 정리한다.", type: "협력형" },
          { text: "말보다 먼저 튀어나가서 이미 계단 두 칸씩 뛰어 내려가고 있다.", type: "실행형" },
          { text: "“지금 내려갔다 오면 100% 늦는다. 그냥 다음 쉬는시간 가자.” 현실적으로 막는다.", type: "안전형" },
          { text: "“야 걸리면 단체로 혼나는 거지 뭐ㅋㅋ 일단 가자” 하면서 분위기 끌고 간다.", type: "긍정형" }
        ]
      },
      {
        question: "4. 조별과제 회의 시간. 친구 한 명이 갑자기 “그냥 감으로 하자”라고 선언했다. 너의 반응은?",
        options: [
          { text: "“감으로 하지 말고 다른 팀 뭐 했는지부터 보자.” 하고 다른 방향도 탐색한다.", type: "도전형" },
          { text: "“감은 무슨 감이야, 기준이 있어야지.” 자료랑 조건부터 따진다.", type: "분석형" },
          { text: "“됐고 오늘 안에 끝낸다.” 말보다 진행 속도로 밀어붙인다", type: "끈기형" },
          { text: "“야 싸우지 말고 일단 공통 의견부터 맞추자.” 분위기부터 정리한다.", type: "협력형" }
        ]
      },
      {
        question: "5. 기숙사에서 불 다 끄고 누웠는데 갑자기 흑역사, 미래 걱정, 쓸데없는 상상이 단체로 몰려온다. 이때 너는?",
        options: [
          { text: "“그만 생각하자… 자야 산다.” 억지로라도 생각 끊는다.", type: "안전형" },
          { text: "“아 몰라, 폰이나 보자.” 바로 다른 행동으로 넘어간다.", type: "실행형" },
          { text: "“근데 내가 왜 이런 생각을 하지...?” 하고 셀프 분석을 시작한다.", type: "분석형" },
          { text: "“오 이것도 재밌는데?” 하고 상상에 상상을 더 얹는다.", type: "긍정형" }
        ]
      },
      {
        question: "6. 시험 전날 밤 11시. 친구가 단톡방에 “나 이거 1도 모르겠음”이라고 올렸다. 너는?",
        options: [
          { text: "“어디서부터 막혔는지 말해봐.” 흐름부터 다시 잡아준다.", type: "분석형" },
          { text: "“야 와봐. 같이 보면 금방 이해됨.” 옆에 붙여서 같이 본다.", type: "협력형" },
          { text: "“모르면 그냥 외워.” 하고 조용히 자기 할 거 한다.", type: "끈기형" },
          { text: "“이거 10분 컷 가능.” 핵심만 바로 찍어준다.", type: "실행형" }
        ]
      },
      {
        question: "7. 체육대회 계주 멤버 한 명이 갑자기 사라졌다. 반 애들 시선이 슬금슬금 너한테 모인다. 너는?",
        options: [
          { text: "“어차피 인생도 대타의 연속이지.” 하면서 웃으면서 그냥 뛴다.", type: "긍정형" },
          { text: "“잠깐, 순서 바꾸면 더 나을 듯?” 전략부터 수정한다.", type: "도전형" },
          { text: "“워밍업 안 하고 뛰면 바로 다친다” 몸 상태부터 체크한다.", type: "안전형" },
          { text: "“앞사람 기록이랑 내 스타트 타이밍 계산해보면...” 이미 머리 굴리는 중.", type: "분석형" }
        ]
      },
      {
        question: "8. 축제 부스 운영 중인데 갑자기 줄이 미친 듯이 길어졌다.",
options: [
  { text: "“야 줄부터 세우고, 설명하는 애랑 만드는 애 나누자.” 바로 역할 정리한다.", type: "협력형" },
  { text: "“일단 되는 것부터 계속 찍어내면 된다.” 말없이 계속 만든다.", type: "끈기형" },
  { text: "말보다 손이 먼저 움직여서 이미 두 개씩 동시에 처리하고 있다.", type: "실행형" },
  { text: "“야 그냥 설명 빨리 돌리고 텐션으로 밀자ㅋㅋ” 갑자기 진행 스타일을 바꾼다.", type: "도전형" }
]
      },
      {
        question: "9. 체육 시간 직전, 친구가 갑자기 “야 나 체육복 없어짐.” 이라고 함. 너는?",
        options: [
          { text: "“마지막으로 입었던 게 언제냐, 동선부터 다시 생각해봐.” 상황부터 역추적한다.", type: "분석형" },
          { text: "“야 일단 내 거 하나 빌려 입어. 나 반팔이라도 입고 뛴다.” 현실적으로 같이 해결한다.", type: "협력형" },
          { text: "“야 걸리면 그때 생각하자ㅋㅋ 일단 나가보자” 별일 아닌 듯 넘긴다.", type: "긍정형" },
          { text: "“그래서 내가 전날에 챙기라고 했지…” 재발 방지부터 떠올린다.", type: "안전형" }
        ]
      },
      {
        question: "10. 실습 과제 난이도 갑자기 헬 모드. 교실 전체 분위기: 멘탈 붕괴.",
        options: [
          { text: "“오늘 안 되면 내일도 하지 뭐.” 묵묵히 해서 결국 끝을 본다.", type: "끈기형" },
          { text: "“일단 시작하면 어떻게든 되겠지” 머리보다 손이 먼저 움직인다.", type: "실행형" },
          { text: "“이 방식 말고 아예 다른 접근 없나?” 새로운 길을 찾는다.", type: "도전형" },
          { text: "“무리해서 하다 사고 나면 진짜 답 없다.” 천천히 안전하게 간다.", type: "안전형" }
        ]
      },
      {
        question: "11. 친구가 시험 망하고 “나 진짜 끝났다...” 하면서 책상에 엎어졌다. 너는?",
        options: [
          { text: "“어느 파트가 털렸는지부터 보자.” 팩트 기반으로 정리한다.", type: "분석형" },
          { text: "“한 번 망했다고 인생 안 끝남ㅎ.” 하고 같이 매점이나 간다", type: "긍정형" },
          { text: "“야 밥부터 먹자. 사람은 밥 먹고 망해야 덜 서럽다.” 옆에 있어준다.", type: "협력형" },
          { text: "“다음 시험 때 뒤집으면 됨.” 말보다 꾸준함을 믿는다.", type: "끈기형" }
        ]

    function startTest() {
        document.getElementById("start-screen").style.display = "none";
        document.getElementById("question-screen").style.display = "block";
        nextQuestion();
    }

    function nextQuestion() {
        if (currentIdx >= questionsData.length) {
            showResult();
            return;
        }

        const q = questionsData[currentIdx];
        document.getElementById("q-num").innerText = `Q${currentIdx + 1}.`;
        document.getElementById("q-title").innerText = q.question;

        const progress = (currentIdx / questionsData.length) * 100;
        document.getElementById("progress-bar").style.width = progress + "%";

        const answersBox = document.getElementById("answers-box");
        answersBox.innerHTML = "";

        q.options.forEach(answer => {
            const btn = document.createElement("button");
            btn.className = "btn";
            btn.innerText = answer.text;
            btn.onclick = () => {
                scores[answer.type] += 1;
                currentIdx++;
                nextQuestion();
            };
            answersBox.appendChild(btn);
        });
    }

    function getTopTypes(scoreMap) {
        const entries = Object.entries(scoreMap);
        const maxScore = Math.max(...entries.map(([_, score]) => score));

        const topTypes = entries
            .filter(([_, score]) => score === maxScore)
            .map(([type]) => type);

        const mainType = topTypes[Math.floor(Math.random() * topTypes.length)];

        const remainingEntries = entries.filter(([type]) => type !== mainType);
        const secondScore = Math.max(...remainingEntries.map(([_, score]) => score));

        const subTypes = remainingEntries
            .filter(([_, score]) => score === secondScore)
            .map(([type]) => type);

        const subType = subTypes[Math.floor(Math.random() * subTypes.length)];

        return { mainType, subType };
    }

    function showResult() {
        document.getElementById("question-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "block";

        const { mainType, subType } = getTopTypes(scores);

        const mainResult = resultsData[mainType];
        const subResult = resultsData[subType];

        document.getElementById("result-name").innerText = mainResult.name;
        document.getElementById("result-desc").innerHTML = mainResult.desc;

        const resultImg = document.getElementById("result-img");
        resultImg.src = mainResult.image;
        resultImg.alt = mainResult.name;
        resultImg.onerror = function () {
            this.src = "https://via.placeholder.com/240?text=No+Image";
        };

        const weaponsBox = document.getElementById("result-weapons");
        weaponsBox.innerHTML = "";

        mainResult.weapons.forEach(word => {
            const span = document.createElement("span");
            span.className = "weapon-tag";
            span.innerText = word;
            weaponsBox.appendChild(span);
        });

        const subResultImg = document.getElementById("sub-result-img");
        subResultImg.src = subResult.image;
        subResultImg.alt = "서브 결과 이미지";
        subResultImg.onerror = function () {
            this.src = "https://via.placeholder.com/170?text=No+Image";
        };

        document.getElementById("progress-bar").style.width = "100%";
