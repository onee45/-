<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이스터고 생존 유형 테스트</title>

    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #f4f7f6;
            font-family: 'Gowun Dodum', sans-serif;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 520px;
            border-radius: 20px;
            border: 4px solid #333;
            box-shadow: 6px 6px 0px #333;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        h1, h2, h3, .result-title, .start-btn, .btn, #q-num {
            font-family: 'Jua', sans-serif;
        }

        h1 {
            font-size: 2.2rem;
            color: #ff6b6b;
            margin-bottom: 10px;
            line-height: 1.35;
            word-break: keep-all;
        }

        .subtitle {
            font-size: 1.15rem;
            color: #555;
            margin-bottom: 24px;
            line-height: 1.6;
            word-break: keep-all;
        }

        .big-emoji-box {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px 22px;
            margin: 24px 0 26px;
        }

        .big-emoji-box span {
            font-size: 4.5rem;
            line-height: 1;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px 16px;
            margin: 12px 0;
            border: 3px solid #333;
            border-radius: 15px;
            background-color: #ffeaa7;
            cursor: pointer;
            font-size: 1.15rem;
            transition: all 0.2s;
            text-align: left;
            word-break: keep-all;
            line-height: 1.5;
        }

        .btn:hover {
            background-color: #fab1a0;
            transform: translateY(-3px);
            box-shadow: 4px 4px 0px #333;
        }

        .start-btn {
            background-color: #55efc4;
            text-align: center;
            font-size: 1.4rem;
        }

        .start-btn:hover {
            background-color: #00b894;
        }

        .progress-container {
            width: 100%;
            background-color: #eee;
            border: 3px solid #333;
            border-radius: 15px;
            height: 24px;
            margin-bottom: 20px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background-color: #74b9ff;
            width: 0%;
            transition: width 0.3s;
        }

        #question-screen,
        #result-screen {
            display: none;
        }

        #q-num {
            font-weight: bold;
            font-size: 1.25rem;
            margin-bottom: 6px;
        }

        .result-img-box {
            display: flex;
            justify-content: center;
            margin: 18px 0 22px;
        }

        .result-img-box img {
            width: 260px;
            height: auto;
            border-radius: 12px;
            border: none;
            object-fit: cover;
        }

        .result-desc {
            font-size: 1.03rem;
            line-height: 1.8;
            background: #f1f2f6;
            padding: 15px;
            border-radius: 15px;
            border: 2px dashed #333;
            margin-bottom: 20px;
            text-align: left;
            word-break: keep-all;
        }

        .weapon-box {
            background: #ffeaa7;
            border: 3px solid #333;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .weapon-box h3 {
            margin: 0 0 10px 0;
            color: #d63031;
            font-size: 1.4rem;
        }

        .weapon-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .weapon-tag {
            background: #fff;
            border: 2px solid #333;
            border-radius: 20px;
            padding: 6px 12px;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 2px 2px 0px #333;
        }

        .sub-result {
            margin-top: 30px;
            padding: 15px;
            background: #dfe6e9;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: bold;
            color: #2d3436;
            border: 2px solid #333;
            line-height: 1.6;
            word-break: keep-all;
        }

        .sub-result-img-box {
            display: flex;
            justify-content: center;
            margin-top: 12px;
        }

        .sub-result-img-box img {
            width: 180px;
            height: auto;
            border-radius: 12px;
            border: none;
            object-fit: cover;
        }

        .compatibility-box {
            margin-top: 20px;
            padding: 15px;
            background: #fff4d6;
            border-radius: 15px;
            border: 3px solid #333;
            text-align: left;
            line-height: 1.7;
            word-break: keep-all;
        }

        .compatibility-box h3 {
            margin: 0 0 10px 0;
            color: #d63031;
            font-size: 1.4rem;
            text-align: center;
        }

        .compatibility-box strong {
            font-family: 'Jua', sans-serif;
            font-size: 1.08rem;
        }

        @media (max-width: 480px) {
            body {
                padding: 14px;
            }

            .container {
                padding: 22px 18px;
            }

            h1 {
                font-size: 1.9rem;
            }

            .result-title {
                font-size: 1.9rem;
            }

            .btn {
                font-size: 1.05rem;
            }

            #q-title {
                font-size: 1.3rem;
            }

            .big-emoji-box {
                gap: 14px 16px;
            }

            .big-emoji-box span {
                font-size: 3.6rem;
            }

            .result-img-box img {
                width: 210px;
                height: 210px;
            }

            .sub-result-img-box img {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <h1>🛠️ 마이스터고<br>생존 유형 테스트 🛠️</h1>
        <p class="subtitle">
            나는 실습실에서 어떤 캐릭터일까?<br>
            나의 영어 무기도 확인해 보자구!
        </p>

        <div class="big-emoji-box" aria-label="유형 동물 이모지">
            <span>🦉</span>
            <span>🐶</span>
            <span>🐹</span>
            <span>🐼</span>
            <span>🐿️</span>
            <span>😄</span>
            <span>🐃</span>
        </div>

        <button class="btn start-btn" onclick="startTest()">테스트 시작하기! 🚀</button>
    </div>

    <div id="question-screen">
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div id="q-num">Q1.</div>
        <h2 id="q-title">질문 내용</h2>
        <div id="answers-box"></div>
    </div>

    <div id="result-screen">
        <h2 style="margin-bottom: 5px;">당신의 실습실 자아는...</h2>
        <div class="result-title" id="result-name">캐릭터 이름</div>

        <div class="result-img-box">
            <img id="result-img" src="" alt="메인 결과 이미지">
        </div>

        <div class="result-desc" id="result-desc">
            팩폭 설명이 들어갑니다.
        </div>

        <div class="weapon-box">
            <h3>⚔️ 나의 영어 무기 ⚔️</h3>
            <div class="weapon-tags" id="result-weapons"></div>
        </div>

        <div class="sub-result" id="sub-result">
            <div>
                내 안에 숨겨진 또 다른 자아 (서브 유형):
                <span id="sub-result-name" style="color: #d63031;"></span>
            </div>

            <div class="sub-result-img-box">
                <img id="sub-result-img" src="" alt="서브 결과 이미지">
            </div>
        </div>

        <button class="btn start-btn" style="margin-top: 30px;" onclick="location.reload()">다시 해보기 🔄</button>
    </div>
</div>

<script>
    const questionsData = [
      {
        question: "1. 실습 시간. 기계가 갑자기 '끼기긱...' 하면서 이상한 소리를 냄. 반 애들 시선이 전부 너한테 꽂혔다. 너는?",
        options: [
          { text: "“잠깐, 이거 어디서 나는 소리지?” 소리 원인부터 추적한다.", type: "분석형" },
          { text: "“야 일단 다 뒤로 가. 괜히 만지지 마.” 애들부터 정리한다.", type: "협력형" },
          { text: "“비켜봐. 내가 한번 해봄.” 바로 공구부터 잡는다.", type: "실행형" },
          { text: "“에이 아직 안 터졌잖아~” 하면서 상황을 웃어넘긴다.", type: "긍정형" }
        ]
      },
      {
        question: "2. 수행평가 제출 30분 전. USB가 갑자기 먹통이 됐다. 지금 교실 공기는 거의 재난 영화다.",
        options: [
          { text: "“야 저장 안 한 거 아니지? 일단 백업부터 확인하자.” 침착하게 리스크부터 챙긴다.", type: "안전형" },
          { text: "“이거 폰으로 옮겨서 해결 가능하지 않나?” 새로운 방법 찾는다.", type: "도전형" },
          { text: "“아직 30분이나 남았네.” 말없이 처음부터 다시 시작한다.", type: "끈기형" },
          { text: "“언제부터 안 됐는지 말해봐.” 증상부터 캐묻고 머릿속으로 재구성한다.", type: "분석형" }
        ]
      },
      {
        question: "3. 축제 준비 중인데 반 애들 절반이 딴짓 중이다. 남은 건 너희 몇 명뿐. 이때 너는?",
        options: [
          { text: "“야 너는 이거, 쟤는 저거. 빨리 나눠.” 역할부터 다시 나눈다.", type: "협력형" },
          { text: "“말로 하지 말고 그냥 하자.” 테이프 들고 바로 작업 시작한다.", type: "실행형" },
          { text: "“칼, 글루건, 전선 정리부터 해. 다치면 축제고 뭐고 끝임.” 위험 요소부터 없앤다.", type: "안전형" },
          { text: "“이거 어차피 터질 판이었음ㅋㅋ” 분위기 살린다.", type: "긍정형" }
        ]
      },
      {
        question: "4. 조별과제 회의 시간. 친구 한 명이 갑자기 “그냥 감으로 하자”라고 선언했다. 너의 반응은?",
        options: [
          { text: "“감으로 하지 말고 다른 반은 뭘 했는지부터 보자.” 남들 안 하는 방향도 탐색한다.", type: "도전형" },
          { text: "“감은 무슨 감이야, 기준이 있어야지.” 자료랑 조건부터 따진다.", type: "분석형" },
          { text: "“됐고 오늘 안에 끝낸다.” 불평 안 하고 끝까지 붙잡고 간다.", type: "끈기형" },
          { text: "“야 싸우지 말고 일단 공통 의견부터 맞추자.” 분위기부터 진정시킨다.", type: "협력형" }
        ]
      },
      {
        question: "5. 기숙사에서 라면 먹다가 갑자기 정전. 뜨거운 물 + 어둠 + 비명 = 생존게임 시작. 너는?",
        options: [
          { text: "“오 개꿀, 지금 손전등 있으면 다 따라와.” 제일 먼저 움직인다.", type: "실행형" },
          { text: "“뜨거운 물 조심해. 바닥 미끄럽다.” 제일 먼저 사고를 걱정한다.", type: "안전형" },
          { text: "“야 이거 은근 캠핑 감성인데?” 상황을 웃기게 받아친다.", type: "긍정형" },
          { text: "“잠깐, 이거 우리 층만 그런 건가?” 남들과 다른 가능성을 먼저 떠올린다.", type: "도전형" }
        ]
      },
     {
  question: "6. 시험 전날 밤 11시. 친구가 단톡방에 “나 이 단원 1도 모르겠음”이라고 올렸다. 너는?",
  options: [
    { text: "핵심 개념이랑 흐름을 정리해서 “여기서 막힌 거 아님?” 하고 짚어준다.", type: "분석형" },
    { text: "“야 내가 설명해줄게. 일단 어디부터 모르냐?” 하고 붙어준다.", type: "협력형" },
    { text: "“모르면 그냥 외워.” 하고 계속 내 공부한다.", type: "끈기형" },
    { text: "“일단 해보자. 10분 안에 끝내봄.” 바로 해결 들어간다.", type: "실행형" }
  ]
},
      {
        question: "7. 체육대회 계주 멤버가 갑자기 빠졌다. 반 애들이 다 너를 본다.",
        options: [
          { text: "“어차피 인생도 대타의 연속이지.” 하면서 웃고 나간다.", type: "긍정형" },
          { text: "“잠깐, 순서 바꾸면 더 나을 듯?” 기존 판을 뒤집는 아이디어를 낸다.", type: "도전형" },
          { text: "“워밍업 안 하고 뛰면 종아리 바로 간다.” 상태부터 체크한다.", type: "안전형" },
          { text: "“앞사람 기록이랑 내 스타트 타이밍 계산해보면...” 머리부터 굴린다.", type: "분석형" }
        ]
      },
      {
        question: "8. 학교에서 자유주제 발표를 하래. 애들은 다 무난한 걸 고르는데 너는?",
        options: [
          { text: "“우리끼리 역할 나눠서 같이 하면 덜 빡세지.” 팀 전체 그림부터 본다.", type: "협력형" },
          { text: "“주제 별로 안 중요함. 일단 끝내는 게 중요하지.” 오래 붙잡고 밀어붙인다.", type: "끈기형" },
          { text: "“그냥 내가 직접 시연해버리면 되잖아.” 행동으로 보여주려 한다.", type: "실행형" },
          { text: "“남들 다 하는 거 말고, 좀 이상한 걸로 가보자.” 특이한 주제를 고른다.", type: "도전형" }
        ]
      },
      {
        question: "9. 친구랑 편의점 갔는데 계산 직전에 지갑이 없는 걸 깨달음. 뒤에 줄 길고 알바 눈치 시작됨. ",
        options: [
          { text: "“마지막으로 꺼낸 데가 어디였는지부터 생각해봐.” 동선을 역추적한다.", type: "분석형" },
          { text: "“야 됐어, 내가 내줄게. 나중에 줘.” 일단 사람부터 살린다.", type: "협력형" },
          { text: "“에이 안 죽어~ 지갑이 다녀오겠지.” 괜히 웃기면서 멘탈 잡아준다.", type: "긍정형" },
          { text: "“앞으로 바지 주머니 말고 가방 안쪽에 넣어.” 재발 방지부터 생각한다.", type: "안전형" }
        ]
      },
      {
        question: "10. 실습 과제 난이도 갑자기 헬 모드 돌입. 교실 전체 분위기: ‘아 이건 아닌데…’. 누군가는 이미 영혼 이탈함.",
        options: [
          { text: "“오늘 안 되면 내일도 한다.” 묵묵히 붙어서 결국 끝을 본다.", type: "끈기형" },
          { text: "“일단 시작하면 길이 보임.” 머리보다 손이 먼저 움직인다.", type: "실행형" },
          { text: "“이 방식 말고 아예 다른 접근 없나?” 정석을 의심한다.", type: "도전형" },
          { text: "“무리해서 하다 사고 나면 진짜 답 없다.” 천천히 안전하게 간다.", type: "안전형" }
        ]
      },
      {
        question: "11. 친구가 시험 망하고 “나 진짜 끝났다...” 하면서 책상에 엎어졌다. 너는?",
        options: [
          { text: "“어느 파트가 털렸는지부터 보자.” 팩트 기반으로 정리한다.", type: "분석형" },
          { text: "“끝난 건 네 시험지지 네 인생은 아님.” 헛소리 같지만 이상하게 위로된다.", type: "긍정형" },
          { text: "“야 밥부터 먹자. 사람은 밥 먹고 망해야 덜 서럽다.” 옆에 붙어준다.", type: "협력형" },
          { text: "“다음 시험 때 뒤집으면 됨.” 말보다 꾸준함을 믿는다.", type: "끈기형" }
        ]
      },
      {
        question: "12. 선생님이 갑자기 ‘이거 자원자 나와서 해볼 사람?’이라고 말했다. 교실 공기 싸해지고, 다들 책 보는 척 중.",
        options: [
          { text: "“제가 하는 대신 좀 다른 방식으로 해봐도 돼요?” 새 판을 깐다.", type: "도전형" },
          { text: "“조건이 뭐고, 어디까지 하면 되는 거죠?” 선부터 정확히 확인한다.", type: "안전형" },
          { text: "손부터 들고 나간다. 나가서 생각해도 늦지 않다고 믿는다.", type: "실행형" },
          { text: "“이거 포인트가 아마 여기일 텐데...” 조용히 구조를 파악하고 들어간다.", type: "끈기형" }
        ]
      },
      {
        question: "13. 주말에 놀러 가자는 말이 나왔는데 계획은 없음. 지금 상태: 말만 100%, 실행 0%.",
        options: [
          { text: "“야 누구 빠지면 섭섭하니까 일단 인원부터 확정하자.” 사람 챙기기부터 한다.", type: "협력형" },
          { text: "“가서 망하면 또 그게 추억이지 ㅋㅋ” 별일 아니란 듯 판을 키운다.", type: "긍정형" },

    let currentIdx = 0;

    let scores = {
        "안전형": 0,
        "도전형": 0,
        "분석형": 0,
        "긍정형": 0,
        "실행형": 0,
        "협력형": 0,
        "끈기형": 0
    };

    function startTest() {
        document.getElementById("start-screen").style.display = "none";
        document.getElementById("question-screen").style.display = "block";
        nextQuestion();
    }

    function nextQuestion() {
        if (currentIdx >= questionsData.length) {
            showResult();
            return;
        }

        const q = questionsData[currentIdx];
        document.getElementById("q-num").innerText = `Q${currentIdx + 1}.`;
        document.getElementById("q-title").innerText = q.question;

        const progress = (currentIdx / questionsData.length) * 100;
        document.getElementById("progress-bar").style.width = progress + "%";

        const answersBox = document.getElementById("answers-box");
        answersBox.innerHTML = "";

        q.options.forEach(answer => {
            const btn = document.createElement("button");
            btn.className = "btn";
            btn.innerText = answer.text;
            btn.onclick = () => {
                scores[answer.type] += 1;
                currentIdx++;
                nextQuestion();
            };
            answersBox.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById("question-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "block";

        const sortedTypes = Object.keys(scores).sort((a, b) => scores[b] - scores[a]);

        const mainType = sortedTypes[0];
        const subType = sortedTypes[1];

        const mainResult = resultsData[mainType];
        const subResult = resultsData[subType];
        const matchInfo = compatibility[mainType];

        document.getElementById("result-name").innerText = mainResult.name;

        const resultImg = document.getElementById("result-img");
        resultImg.src = mainResult.image;
        resultImg.alt = mainResult.name;
        resultImg.onerror = function () {
            this.src = "https://via.placeholder.com/240?text=No+Image";
        };

        document.getElementById("result-desc").innerText = mainResult.desc;

        const weaponsBox = document.getElementById("result-weapons");
        weaponsBox.innerHTML = "";

        mainResult.weapons.forEach(word => {
            const span = document.createElement("span");
            span.className = "weapon-tag";
            span.innerText = word;
            weaponsBox.appendChild(span);
        });

        document.getElementById("sub-result-name").innerText = subResult.name;

        const subResultImg = document.getElementById("sub-result-img");
        subResultImg.src = subResult.image;
        subResultImg.alt = subResult.name;
        subResultImg.onerror = function () {
            this.src = "https://via.placeholder.com/170?text=No+Image";
        };

        document.getElementById("best-match").innerText = `${resultsData[matchInfo.best].name}`;
        document.getElementById("worst-match").innerText = `${resultsData[matchInfo.worst].name}`;

        document.getElementById("progress-bar").style.width = "100%";
    }
